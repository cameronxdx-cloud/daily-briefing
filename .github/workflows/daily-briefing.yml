# ============================================================
#  Daily WhatsApp Briefing — GitHub Actions Workflow
#  Runs every day at 6:00 AM Pacific time (Las Vegas)
# ============================================================

name: Daily WhatsApp Briefing

on:
  # ── Scheduled trigger ──────────────────────────────────────
  # Cron uses UTC. Las Vegas is:
  #   PDT (Mar–Nov): UTC-7  →  6 AM PDT = 13:00 UTC  →  0 13 * * *
  #   PST (Nov–Mar): UTC-8  →  6 AM PST = 14:00 UTC  →  0 14 * * *
  #
  # Change the line below each November and March, or use 13
  # for most of the year (daylight saving time, summer/fall).
  schedule:
    - cron: "0 13 * * *"   # 6:00 AM PDT (UTC-7) — summer/fall

  # ── Manual trigger (for testing) ──────────────────────────
  # Go to: GitHub repo → Actions tab → Daily WhatsApp Briefing
  # → Run workflow → Run workflow
  workflow_dispatch:

jobs:
  send-briefing:
    name: Generate & send morning briefing
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run the briefing script
      #    All secrets are injected from GitHub → Settings → Secrets
      - name: Send WhatsApp briefing
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID:      ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:       ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM:    ${{ secrets.TWILIO_WHATSAPP_FROM }}
          YOUR_WHATSAPP_NUMBER:    ${{ secrets.YOUR_WHATSAPP_NUMBER }}
        run: node src/briefing.js
